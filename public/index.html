<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claude Sessions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-dot"></div>
          <h1>Sessions</h1>
          <button id="theme-toggle" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">☾</button>
        </div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" />
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <input id="search" type="search" placeholder="Search sessions..." />
        </div>
      </div>
      <div id="projects"></div>
      <div id="sessions"></div>
    </aside>
    <main id="main">
      <div id="session-meta"></div>
      <div id="thread">
        <div class="empty-state">
          <div class="empty-icon">◐</div>
          <div class="empty-title">Select a session</div>
          <div class="empty-sub">Your Claude Code conversations, one click away.</div>
        </div>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
